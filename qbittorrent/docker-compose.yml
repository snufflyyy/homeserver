services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - /home/braden/qbittorrent/config:/config
      - /mnt/drive-one:/drive-one
      - /mnt/drive-two:/drive-two
      - /mnt/drive-two/downloads:/downloads
    network_mode: "container:gluetun"
    restart: unless-stopped
