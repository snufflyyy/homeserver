services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    ports:
      - 8096:8096/tcp
      - 7359:7359/udp
    volumes:
      - /home/braden/jellyfin/config:/config
      - /home/braden/jellyfin/cache:/cache
      - type: bind
        source: /mnt/drive-one/media
        target: /media1
        read_only: true
      - type: bind
        source: /mnt/drive-two/media
        target: /media2
        read_only: true
    restart: 'unless-stopped'
    devices:
#     - /dev/dri
      - /dev/dri/card0
      - /dev/dri/renderD128:/dev/dri/renderD128
    group_add:
      - "992"
    # Optional - may be necessary for docker healthcheck to pass if running in host network mode
    extra_hosts:
      - 'host.docker.internal:host-gateway'
